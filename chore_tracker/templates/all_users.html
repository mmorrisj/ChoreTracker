<!DOCTYPE html>
<html>
<head>
    <title>All Users</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>All Users</h1>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Role</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user['id'] }}</td>
                    <td>{{ user['name'] }}</td>
                    <td>{{ user['role'] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <h2>Remove User</h2>
        <form action="{{ url_for('remove_user') }}" method="post">
            <input type="number" name="user_id" placeholder="User ID">
            <button type="submit">Remove User</button>
        </form>
    </div>
</body>
</html>
