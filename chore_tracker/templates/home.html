<html>
<head>
    <title>Home</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Select a Child</h1>
        {% for child in children %}
            <div class="child-section">
                <button class="child-button" onclick="location.href='{{ url_for('main.manage_chores', child_id=child['id']) }}'">
                    {{ child['name'] }}
                </button>
                <form method="POST" action="{{ url_for('main.complete_tasks', child_id=child['id']) }}">
                    <div class="tasks-section">
                        {% for task in child_tasks[child['id']] %}
                            <div class="task-item">
                                <input type="checkbox" name="tasks" value="{{ task['id'] }}">
                                <label>{{ task['name'] }}</label>
                            </div>
                        {% endfor %}
                    </div>
                    <div class="button-group">
                        <button type="submit" class="action-button">Submit</button>
                        <button type="submit" name="action" value="Act of Kindness" class="action-button">Act of Kindness</button>
                        <button type="submit" name="action" value="10 Minute Helpfulness" class="action-button">10 Minute Helpfulness</button>
                        <button type="submit" name="action" value="Good Listening" class="action-button">Good Listening</button>
                    </div>
                </form>
            </div>
        {% endfor %}
    </div>
</body>
</html>
