<!DOCTYPE html>
<html>
<head>
    <title>Parent Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        h1, h2 {
            color: #333;
        }
        .container {
            width: 80%;
            max-width: 800px;
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .child-button {
            display: block;
            width: 100%;
            padding: 20px;
            font-size: 1.5em;
            margin-bottom: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
        }
        .child-button:hover {
            background-color: #218838;
        }
        .button-link {
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: #007BFF;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
        }

        .button-link:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Select a Child</h1>
        {% for child in children %}
            <button class="child-button" onclick="location.href='{{ url_for('manage_chores', child_id=child['id']) }}'">
                {{ child['name'] }}
            </button>
        {% endfor %}
        <h2>Children's Earnings</h2>
        <canvas id="myChart" width="400" height="200"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Sample data
        const categories = ['Category 1', 'Category 2', 'Category 3', 'Category 4', 'Category 5'];
        const values = [120, 90, 150, 80, 130];

        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: categories,
                datasets: [{
                    label: 'Values',
                    data: values,
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                indexAxis: 'y', // This makes the chart horizontal
                scales: {
                    x: {
                        beginAtZero: true,
                        max: 200 // Sets the maximum value of the x-axis
                    }
                },
                barThickness: 10, // Adjust this value to make bars thinner
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });
    </script>
     <a href="add_preset_chore" class="button-link">Create Preset Chore</a>
</body>
</html>
