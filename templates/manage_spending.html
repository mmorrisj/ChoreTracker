<!DOCTYPE html>
<html>
<head>
    <title>Manage Spending for {{ child['name'] }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        h1, h2 {
            color: #333;
        }
        form {
            width: 80%;
            max-width: 800px;
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        label {
            display: inline-block;
            margin-right: 10px;
        }
        input[type="text"], input[type="number"], select {
            width: calc(100% - 20px);
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .quick-submit {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .quick-submit button {
            background-color: #007bff;
        }
        .quick-submit button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Manage Spending for {{ child['name'] }}</h1>
    <form method="post">
        <h2>Quick Submit</h2>
        <div class="quick-submit">
            <button type="submit" name="quick_submit" value="25 Cent Spend">Spend $0.25</button>
            <button type="submit" name="quick_submit" value="1 Dollar Spend">Spend $1.00</button>
            <button type="submit" name="quick_submit" value="5 Dollar Spend">Spend $5.00</button>
        </div>

        <h2>Custom Expense</h2>
        <div>
            <label for="custom_description">Expense Description:</label>
            <input type="text" name="custom_description" id="custom_description">
        </div>
        <div>
            <label for="custom_amount">Amount Spent:</label>
            <input type="number" step="0.01" name="custom_amount" id="custom_amount">
        </div>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
