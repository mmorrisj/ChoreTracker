<!DOCTYPE html>
<html>
<head>
    <title>Manage Spending for {{ child['name'] }}</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>Manage Spending for {{ child['name'] }}</h1>
    <form method="post" action="{{ url_for('chore.manage_spending', child_id=child['id']) }}">
        <h2>Quick Submit</h2>
        <div class="quick-submit">
            <button type="submit" name="quick_submit" value="25 Cent Spend">Spend $0.25</button>
            <button type="submit" name="quick_submit" value="1 Dollar Spend">Spend $1.00</button>
            <button type="submit" name="quick_submit" value="5 Dollar Spend">Spend $5.00</button>
        </div>

        <h2>Custom Expense</h2>
        <div>
            <label for="custom_description">Expense Description:</label>
            <input type="text" name="custom_description" id="custom_description">
        </div>
        <div>
            <label for="custom_amount">Amount Spent:</label>
            <input type="number" step="0.01" name="custom_amount" id="custom_amount">
        </div>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
